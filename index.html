<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>For You ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:black;
    overflow:hidden;
    height:100vh;
    color:white;
}

/* Screens */

.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s ease;
}

/* First Screen */

#screen1{
    background:
    linear-gradient(to bottom,
    rgba(0,0,0,0.4),
    rgba(0,0,0,0.9));
}

/* Second Screen */

#screen2{
    background:black;
    opacity:0;
    pointer-events:none;
}

/* Active screen */

.show{
    opacity:1 !important;
    pointer-events:auto !important;
}

/* Henry media */

.henry{
    width:320px;
    max-width:85%;
    border-radius:22px;
    opacity:0;
    animation:fadeImage 2s forwards;
    box-shadow:
    0 0 30px rgba(255,255,255,0.15),
    0 0 80px rgba(255,0,100,0.15);

    transform:scale(0.95);
}

/* Text */

.text{
    margin-top:22px;
    text-align:center;
    opacity:0;
    padding:0 20px;
}

#text1{
    font-size:2.2rem;
    animation:fadeText 2s forwards;
    animation-delay:2s;
}

#text2{
    font-size:1.4rem;
    animation:fadeText 2s forwards;
    animation-delay:5s;
}

/* Button */

button{
    margin-top:35px;
    padding:14px 34px;
    border:none;
    border-radius:50px;
    background:#ff2e63;
    color:white;
    font-size:1.1rem;
    cursor:pointer;
    opacity:0;

    animation:fadeText 2s forwards;
    animation-delay:8s;

    transition:0.3s ease;
    box-shadow:0 0 20px rgba(255,46,99,0.5);
}

button:hover{
    transform:scale(1.08);
}

/* Final text */

.finalText{
    font-size:3rem;
    text-align:center;
    margin-top:25px;

    opacity:0;
    animation:dramaticText 1.5s forwards;
    animation-delay:0.5s;

    text-shadow:
    0 0 10px rgba(255,255,255,0.4),
    0 0 25px rgba(255,0,120,0.6);
}

/* Hearts */

.heart{
    position:absolute;
    bottom:-20px;
    color:#ff4d6d;
    animation:float linear infinite;
    opacity:0.7;
}

/* Animations */

@keyframes fadeImage{
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes fadeText{
    to{
        opacity:1;
    }
}

@keyframes dramaticText{
    from{
        opacity:0;
        transform:scale(0.7);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:0.8;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Mobile */

@media(max-width:600px){

    #text1{
        font-size:1.8rem;
    }

    #text2{
        font-size:1.2rem;
    }

    .finalText{
        font-size:2.2rem;
    }

}

</style>
</head>

<body>

<!-- SCREEN 1 -->

<div id="screen1" class="screen show">

    <!-- USE GIF / WEBP HERE -->

    <img
        class="henry"
        src="henry1.webp"
        alt="Henry Cavill"
    />

    <div id="text1" class="text">
        hey gorgeous ❤️
    </div>

    <div id="text2" class="text">
        Heard you were feeling a bit down
    </div>

    <button onclick="showSecondScreen()">
        Press Me
    </button>

</div>

<!-- SCREEN 2 -->

<div id="screen2" class="screen">

    <!-- USE WEBP / GIF HERE -->

    <img
        class="henry"
        src="henry2.gif"
        alt="Henry Cavill"
    />

    <div class="finalText">
        How about now 😏
    </div>

</div>

<script>

/* Floating hearts */

for(let i=0;i<30;i++){

    const heart=document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=
        (15+Math.random()*25)+"px";

    heart.style.animationDuration=
        (4+Math.random()*5)+"s";

    heart.style.animationDelay=
        Math.random()*5+"s";

    document.body.appendChild(heart);
}

/* Switch screen */

function showSecondScreen(){

    const screen1 =
        document.getElementById("screen1");

    const screen2 =
        document.getElementById("screen2");

    screen1.style.opacity="0";

    setTimeout(()=>{

        screen1.style.display="none";

        screen2.classList.add("show");

    },800);

}

</script>

</body>
</html>

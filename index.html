<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    transition:1.5s ease;
    background:#f5ebe0;
}

/* Screens */

.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s ease;
}

/* Romantic second screen */

#screen2{
    opacity:0;
    pointer-events:none;

    background:
    radial-gradient(circle at center,
    #5a001d,
    #220010,
    #120008);

    transition:1.5s ease;
}

/* Hearts behind content */

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

/* Main content above hearts */

.content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* Henry media */

.henry{
    width:320px;
    max-width:85%;
    border-radius:24px;

    opacity:0;
    animation:fadeImage 2s forwards;

    box-shadow:
    0 0 30px rgba(255,255,255,0.15),
    0 0 80px rgba(255,0,100,0.15);
}

/* Text */

.text{
    margin-top:22px;
    text-align:center;
    color:white;
    opacity:0;
    padding:0 20px;
}

#text1{
    font-size:2.3rem;
    color:#2d1e2f;

    animation:fadeText 2s forwards;
    animation-delay:2s;
}

#text2{
    font-size:1.3rem;
    color:#5c374c;

    animation:fadeText 2s forwards;
    animation-delay:5s;
}

/* Button */

button{
    margin-top:35px;
    padding:14px 34px;

    border:none;
    border-radius:50px;

    background:#d63384;
    color:white;

    font-size:1.1rem;
    cursor:pointer;

    opacity:0;

    animation:fadeText 2s forwards;
    animation-delay:8s;

    transition:0.3s ease;

    box-shadow:
    0 0 20px rgba(214,51,132,0.4);
}

button:hover{
    transform:scale(1.08);
}

/* Final text */

.finalText{
    font-size:3rem;
    margin-top:25px;

    color:white;
    text-align:center;

    opacity:0;

    animation:dramaticText 1.5s forwards;
    animation-delay:0.5s;

    text-shadow:
    0 0 12px rgba(255,255,255,0.4),
    0 0 25px rgba(255,0,100,0.7);
}

/* Hearts */

.heart{
    position:absolute;
    bottom:-20px;

    color:#ff4d6d;

    animation:float linear infinite;

    opacity:0.5;

    z-index:0;
}

/* Animations */

@keyframes fadeImage{

    from{
        opacity:0;
        transform:scale(0.9);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes fadeText{

    to{
        opacity:1;
    }
}

@keyframes dramaticText{

    from{
        opacity:0;
        transform:scale(0.7);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes float{

    from{
        transform:translateY(0);
        opacity:0.5;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Mobile */

@media(max-width:600px){

    .henry{
        width:290px;
    }

    #text1{
        font-size:2rem;
    }

    #text2{
        font-size:1.2rem;
    }

    .finalText{
        font-size:2.5rem;
        padding:0 20px;
    }
}

</style>
</head>

<body>

<!-- SCREEN 1 -->

<div id="screen1" class="screen">

    <div class="hearts" id="hearts1"></div>

    <div class="content">

        <img
            class="henry"
            src="henry1.webp"
            alt="Henry Cavill"
        >

        <div id="text1" class="text">
            hey gorgeous ❤️
        </div>

        <div id="text2" class="text">
            Heard you were feeling a bit down
        </div>

        <button onclick="showSecondScreen()">
            Press Me
        </button>

    </div>

</div>

<!-- SCREEN 2 -->

<div id="screen2" class="screen">

    <div class="hearts" id="hearts2"></div>

    <div class="content">

        <img
            class="henry"
            src="Henry2.gif"
            alt="Henry Cavill"
        >

        <div class="finalText">
            How about now 😏
        </div>

    </div>

</div>

<script>

/* Create hearts */

function createHearts(containerId){

    const container =
        document.getElementById(containerId);

    for(let i=0;i<30;i++){

        const heart =
            document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML="❤️";

        heart.style.left =
            Math.random()*100+"vw";

        heart.style.fontSize =
            (15+Math.random()*25)+"px";

        heart.style.animationDuration =
            (5+Math.random()*5)+"s";

        heart.style.animationDelay =
            Math.random()*5+"s";

        container.appendChild(heart);
    }
}

createHearts("hearts1");
createHearts("hearts2");

/* Switch screens */

function showSecondScreen(){

    document.body.style.background =
    "#120008";

    const screen1 =
        document.getElementById("screen1");

    const screen2 =
        document.getElementById("screen2");

    screen1.style.opacity="0";

    setTimeout(()=>{

        screen1.style.display="none";

        screen2.style.opacity="1";
        screen2.style.pointerEvents="auto";

    },800);
}

</script>

</body>
</html>
